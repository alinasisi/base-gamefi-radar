name: Daily GameFi Radar
on:
  schedule:
    - cron: '23 6 * * *'
    - cron: '23 8 * * *'
    - cron: '23 10 * * *'
    - cron: '23 12 * * *'
    - cron: '23 14 * * *'
  workflow_dispatch:
jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Skip if already ran today
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f "reports/${TODAY}.md" ]; then
            echo "already_ran=true" >> $GITHUB_OUTPUT
          else
            echo "already_ran=false" >> $GITHUB_OUTPUT
          fi
      - name: Run bot
        if: steps.check.outputs.already_ran == 'false'
        run: node src/bot.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_USERNAME: alinasisi
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
          GH_PAT: ${{ secrets.GH_PAT }}
      - name: Commit and push
        if: steps.check.outputs.already_ran == 'false'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "gamefi-radar-bot"
          git config --global user.email "bot@base-gamefi-radar"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/alinasisi/base-gamefi-radar.git"
          git pull origin main --rebase
          mkdir -p reports
          git add reports/
          git diff --staged --quiet || git commit -m "radar: daily gamefi intelligence $(date +%Y-%m-%d)"
          git push origin main
      - name: Already ran today
        if: steps.check.outputs.already_ran == 'true'
        run: echo "Report already exists for today, skipping."
